[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-courtroom-harness"
version = "0.1.0"
description = "Phase 0 skeleton for AI Courtroom Harness"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.115.0",
  "pydantic>=2.8.0",
  "uvicorn>=0.30.0",
]

[tool.setuptools]
include-package-data = true

